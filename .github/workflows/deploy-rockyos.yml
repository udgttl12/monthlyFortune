name: Deploy to RockyOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - name: Validate deployment configuration
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          missing=0

          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error title=Missing DEPLOY_HOST::Set the production environment secret DEPLOY_HOST to donggyu.link."
            missing=1
          fi

          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error title=Missing DEPLOY_SSH_KEY::Set the production environment secret DEPLOY_SSH_KEY to the ec2-user private key."
            missing=1
          fi

          if [ -z "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            echo "::error title=Missing DEPLOY_KNOWN_HOSTS::Set the production environment secret DEPLOY_KNOWN_HOSTS to the ssh-keyscan output for donggyu.link."
            missing=1
          fi

          exit "${missing}"

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Prepare frontend artifact
        run: |
          if [ ! -f .next/standalone/server.js ]; then
            echo "::error title=Missing standalone frontend artifact::Next.js did not create .next/standalone/server.js."
            exit 1
          fi
          rm -rf .next/standalone/.next/static .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: .venv/bin/python -m unittest discover -s tests -v

      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            --rsync-path "mkdir -p /var/www/python/monthlyFortune && rsync" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.next/cache/' \
            --exclude '.venv/' \
            --exclude '.venv-root/' \
            --exclude 'astro-app/' \
            --exclude 'node_modules/' \
            --exclude 'live-backend.err.log' \
            --exclude 'live-backend.log' \
            --exclude 'live-frontend.err.log' \
            --exclude 'live-frontend.log' \
            --exclude '.env.production' \
            -e "ssh -p 22 -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            ./ "ec2-user@${DEPLOY_HOST}:/var/www/python/monthlyFortune/"

      - name: Build and restart services on server
        run: |
          ssh -p 22 -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 "ec2-user@${DEPLOY_HOST}" bash -s <<'EOF'
          set -euo pipefail
          cd /var/www/python/monthlyFortune
          RUN_TESTS=0 FRONTEND_INSTALL=0 FRONTEND_BUILD=0 RESTART_SERVICES=0 SYSTEMD_RELOAD=0 bash scripts/deploy-rockyos.sh

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=()
          else
            SUDO=(sudo -n)
          fi

          "${SUDO[@]}" install -m 644 deploy/rockyos/monthly-fortune-api.service /etc/systemd/system/monthly-fortune-api.service
          "${SUDO[@]}" install -m 644 deploy/rockyos/monthly-fortune-web.service /etc/systemd/system/monthly-fortune-web.service
          "${SUDO[@]}" install -d -m 755 /etc/nginx/conf.d
          "${SUDO[@]}" install -m 644 deploy/rockyos/monthly-fortune.nginx.conf /etc/nginx/conf.d/monthly-fortune.conf
          "${SUDO[@]}" nginx -t
          "${SUDO[@]}" systemctl daemon-reload
          "${SUDO[@]}" systemctl enable monthly-fortune-api
          "${SUDO[@]}" systemctl enable monthly-fortune-web
          "${SUDO[@]}" systemctl enable nginx
          "${SUDO[@]}" systemctl restart monthly-fortune-api
          "${SUDO[@]}" systemctl restart monthly-fortune-web
          "${SUDO[@]}" systemctl reload nginx

          EOF
